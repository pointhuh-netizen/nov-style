<div id="nov-style-settings" class="nov-style-container">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>📝 Nov Style Engine</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div id="nov-style-loading" class="nov-style-loading">
                <span class="fa-solid fa-spinner fa-spin"></span> 데이터 로드 중...
            </div>
            <div id="nov-style-axes" class="nov-style-section" style="display:none"></div>
            <div id="nov-style-configs" class="nov-style-section" style="display:none"></div>
            <hr>
            <div id="nov-style-actions">
                <button id="nov-style-apply" class="menu_button" title="선택한 문체 설정을 프롬프트에 적용합니다">✅ 적용</button>
                <button id="nov-style-preview-btn" class="menu_button" title="생성될 프롬프트를 미리 봅니다">👁️ 미리보기</button>
                <button id="nov-style-reset" class="menu_button" title="모든 선택을 초기화합니다">🔄 초기화</button>
            </div>
            <div id="nov-style-status" class="nov-style-status">적용된 빌드 없음</div>
            <textarea id="nov-style-preview-text" class="nov-style-preview" readonly placeholder="미리보기를 클릭하면 여기에 표시됩니다"></textarea>
        </div>
    </div>
</div>
